site_name: "Stock Prices"
site_description: "Анимированные рыночные графики для CLI и Telegram"
site_url: "https://karnaksp.github.io/stock-prices"
repo_url: "https://github.com/karnaksp/stock-prices"
repo_name: "karnaksp/stock-prices"
site_dir: "site"
watch: [mkdocs.yml, README.md, docs, src/stock_prices]
copyright: Copyright &copy; 2026 Denis Irinyakov
edit_uri: edit/main/docs/

validation:
  omitted_files: warn
  absolute_links: warn
  unrecognized_links: warn

nav:
- Документация:
  - Главная: index.md
  - Демонстрация: demo.md
  - Запуск и проверка: runbook.md
  - Docker: docker.md
- API: reference/api.md
- Проект:
  - История изменений: changelog.md
  - Разработка: contributing.md
  - Правила участия: code_of_conduct.md
  - Благодарности: credits.md
  - Лицензия: license.md

theme:
  name: material
  language: ru
  custom_dir: docs/.overrides
  features:
  - announce.dismiss
  - content.action.edit
  - content.action.view
  - content.code.annotate
  - content.code.copy
  - content.tooltips
  - navigation.footer
  - navigation.instant.preview
  - navigation.path
  - navigation.sections
  - navigation.tabs
  - navigation.tabs.sticky
  - navigation.top
  - search.highlight
  - search.suggest
  - toc.follow
  palette:
  - media: "(prefers-color-scheme)"
    toggle:
      icon: material/brightness-auto
      name: Переключить на светлую тему
  - media: "(prefers-color-scheme: light)"
    scheme: default
    primary: teal
    accent: purple
    toggle:
      icon: material/weather-sunny
      name: Переключить на темную тему
  - media: "(prefers-color-scheme: dark)"
    scheme: slate
    primary: black
    accent: lime
    toggle:
      icon: material/weather-night
      name: Использовать системную тему

extra_css:
- css/material.css
- css/mkdocstrings.css

extra_javascript:
- https://unpkg.com/mermaid@11/dist/mermaid.min.js
- js/mermaid.js
- js/feedback.js

markdown_extensions:
- attr_list
- admonition
- footnotes
- pymdownx.emoji:
    emoji_index: !!python/name:material.extensions.emoji.twemoji
    emoji_generator: !!python/name:material.extensions.emoji.to_svg
- pymdownx.magiclink
- pymdownx.snippets:
    base_path: [!relative $config_dir]
    check_paths: true
- pymdownx.superfences:
    custom_fences:
    - name: mermaid
      class: mermaid-source
      format: !!python/name:pymdownx.superfences.fence_code_format
- pymdownx.tabbed:
    alternate_style: true
    slugify: !!python/object/apply:pymdownx.slugs.slugify
      kwds:
        case: lower
- pymdownx.tasklist:
    custom_checkbox: true
- toc:
    permalink: true

plugins:
- search
- autorefs
- mkdocstrings:
    handlers:
      python:
        inventories:
        - https://docs.python.org/3/objects.inv
        paths: [src]
        options:
          backlinks: tree
          docstring_options:
            ignore_init_summary: true
          docstring_section_style: list
          filters: ["!^_"]
          heading_level: 1
          inherited_members: true
          merge_init_into_class: true
          separate_signature: true
          show_root_heading: true
          show_root_full_path: false
          show_signature_annotations: true
          show_source: true
          show_symbol_type_heading: true
          show_symbol_type_toc: true
          signature_crossrefs: true
          summary: true

extra:
  social:
  - icon: fontawesome/brands/github
    link: https://github.com/karnaksp
  - icon: fontawesome/brands/gitter
    link: https://gitter.im/stock-prices/community
  - icon: fontawesome/brands/python
    link: https://pypi.org/project/stock-prices/
  analytics:
    feedback:
      title: Эта страница была полезной?
      ratings:
        - icon: material/emoticon-happy-outline
          name: Страница помогла
          data: 1
          note: Спасибо за обратную связь!
        - icon: material/emoticon-sad-outline
          name: Страницу можно улучшить
          data: 0
          note: Сообщите, что стоит доработать.
